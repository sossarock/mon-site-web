<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriConnectBJ - Produits agricoles du Bénin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    header { background: #2e7d32; color: white; padding: 20px; text-align: center; }
    h1 { margin: 0; }
    .produits { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
    .produit { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; padding: 15px; text-align: center; }
    .produit img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
    .prix { color: #2e7d32; font-weight: bold; font-size: 18px; margin-top: 10px; }
    footer { background: #333; color: white; text-align: center; padding: 15px; margin-top: 20px; }
  </style>
</head>
<body>

  <header>
    <h1>🌾 AgriConnectBJ</h1>
    <p>Produits agricoles frais directement du producteur</p>
  </header>

  <div class="produits">
    
    <div class="produit">
      <img src="assets/mais.jpg" alt="Maïs">
      <h3>Maïs Blanc</h3>
      <p>Sac de 100kg - Qualité supérieure</p>
      <p class="prix">35 000 FCFA</p>
    </div>

    <div class="produit">
      <img src="assets/igname.jpg" alt="Igname">
      <h3>Igname</h3>
      <p>Tas de 10 tubercules - Frais</p>
      <p class="prix">15 000 FCFA</p>
    </div>

    <div class="produit">
      <img src="assets/riz.jpg" alt="Riz">
      <h3>Riz Local</h3>
      <p>Sac de 50kg - Riz de la vallée</p>
      <p class="prix">25 000 FCFA</p>
    </div>

  </div>

  <footer>
    <p>© 2026 AgriConnectBJ | Contact: WhatsApp 01 XX</p>
  </footer>

</body>
</html>
